# Docker Compose: service name `backend` + internal `PORT` must match `proxy_pass` below
# (defaults: backend:3000 — change both if you remap PORT in compose).

# Conditionally set Connection header based on whether the request is a WebSocket upgrade.
# WebSocket:  Upgrade header present  → Connection: upgrade  (required for WS handshake)
# REST / SSE: Upgrade header absent   → Connection: ''       (keeps SSE / HTTP streaming working)
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        '';
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy `/api/*` to Express — strips `/api/` so `/api/assets/...` → upstream `/assets/...`.
    # Also handles Socket.io: `/api/socket.io/` → upstream `/socket.io/` (nginx strips the prefix).
    # Both containers run --network host, so backend is reachable via localhost.
    location /api/ {
        proxy_pass         http://localhost:3000/;
        proxy_http_version 1.1;

        # Forward WebSocket upgrade when present; fall back to '' for REST/SSE.
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering — required for both SSE chunks and WebSocket frames
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Forward cookies transparently
        proxy_pass_header  Set-Cookie;
    }

    # Angular client-side routing — fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html so the browser always fetches the latest shell
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
